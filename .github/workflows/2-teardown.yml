# Workflow 2: Teardown Application
#
# Stops and removes the deployed application from the EC2 instance without
# touching the runtime, nginx install, or the environment/secrets file.
# Run this before re-provisioning or making infrastructure changes, then
# follow up with workflow 3 to redeploy.
#
# Required GitHub Secrets:
#   EC2_HOST    — EC2 public IP or hostname
#   EC2_USER    — SSH username (e.g. ubuntu)
#   EC2_SSH_KEY — Full PEM private key content

name: "2 · Teardown Application"

on:
  workflow_dispatch:

jobs:
  teardown:
    name: Stop and remove deployed application
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Stop and disable systemd service
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' << 'ENDSSH'
          set -euo pipefail
          if systemctl is-active --quiet storecreditor; then
            sudo systemctl stop storecreditor
            echo "✓ Service stopped"
          else
            echo "Service was not running"
          fi
          if systemctl is-enabled --quiet storecreditor 2>/dev/null; then
            sudo systemctl disable storecreditor
            echo "✓ Service disabled"
          fi
          ENDSSH

      - name: Remove application files
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' << 'ENDSSH'
          set -euo pipefail
          sudo rm -rf /var/www/storecreditor/*
          echo "✓ Application files removed from /var/www/storecreditor"
          ENDSSH

      - name: Remove systemd service unit
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' << 'ENDSSH'
          set -euo pipefail
          if [ -f /etc/systemd/system/storecreditor.service ]; then
            sudo rm /etc/systemd/system/storecreditor.service
            sudo systemctl daemon-reload
            echo "✓ systemd unit removed"
          else
            echo "No systemd unit found, skipping"
          fi
          ENDSSH

      - name: Remove nginx site configuration
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' << 'ENDSSH'
          set -euo pipefail
          sudo rm -f /etc/nginx/sites-enabled/storecreditor
          sudo rm -f /etc/nginx/sites-available/storecreditor
          # Restore the default nginx site so the server isn't serving a blank 404
          if [ -f /etc/nginx/sites-available/default ]; then
            sudo ln -sf /etc/nginx/sites-available/default /etc/nginx/sites-enabled/default
          fi
          sudo nginx -t
          sudo systemctl reload nginx
          echo "✓ nginx site config removed and nginx reloaded"
          ENDSSH

      - name: Summary
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' << 'ENDSSH'
          echo "Teardown complete."
          echo "  Preserved: .NET runtime, nginx, /etc/storecreditor/environment"
          echo "  Removed:   application files, systemd unit, nginx site config"
          echo ""
          echo "To redeploy: run workflow '1 · Provision EC2' then '3 · Build & Deploy'."
          ENDSSH
