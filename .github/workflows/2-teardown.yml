name: 2. Teardown EC2

# Completely removes the app, SQL Server, .NET runtime, sqlcmd, and Nginx
# config from the EC2 instance, returning it to a clean state. Run the
# Provision workflow afterward to set it up again.
#
# WARNING: This permanently deletes all SQL Server data on the instance.
#
# Targets: Ubuntu Server 24.04 LTS or 26.04 LTS
#
# Required GitHub Secrets:
#   EC2_HOST    - Public IP or DNS of the EC2 instance
#   EC2_SSH_KEY - Contents of the .pem private key file

on:
  workflow_dispatch:

jobs:
  teardown:
    name: Teardown EC2 instance
    runs-on: ubuntu-latest

    steps:
      - name: Remove all deployed components
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m

          script: |
            set -uo pipefail

            echo "==> Stopping and removing app service..."
            sudo systemctl stop storecreditor || true
            sudo systemctl disable storecreditor || true
            sudo rm -f /etc/systemd/system/storecreditor.service
            sudo systemctl daemon-reload
            sudo systemctl reset-failed || true

            echo "==> Removing app files and secrets..."
            sudo rm -rf /opt/storecreditor
            sudo rm -rf /etc/storecreditor

            echo "==> Stopping SQL Server..."
            sudo systemctl stop mssql-server || true
            sudo systemctl disable mssql-server || true

            echo "==> Uninstalling SQL Server packages..."
            sudo apt-get remove -y mssql-server || true
            sudo apt-get autoremove -y || true

            echo "==> Removing SQL Server data and config..."
            sudo rm -rf /var/opt/mssql
            sudo rm -f /etc/apt/sources.list.d/mssql-server.list

            echo "==> Removing .NET runtime..."
            sudo apt-get remove -y aspnetcore-runtime-10.0 || true
            sudo apt-get autoremove -y || true

            echo "==> Removing sqlcmd..."
            sudo ACCEPT_EULA=Y apt-get remove -y mssql-tools18 unixodbc-dev || true
            sudo rm -f /etc/apt/sources.list.d/msprod.list
            sudo rm -f /usr/share/keyrings/microsoft.gpg
            sudo rm -f /etc/profile.d/mssql-tools.sh

            echo "==> Removing Microsoft package repository..."
            sudo apt-get remove -y packages-microsoft-prod || true
            sudo apt-get autoremove -y || true

            echo "==> Removing Nginx app config..."
            sudo rm -f /etc/nginx/sites-enabled/storecreditor
            sudo rm -f /etc/nginx/sites-available/storecreditor
            sudo nginx -t && sudo systemctl reload nginx || true

            echo ""
            echo "==========================================="
            echo " Teardown complete."
            echo " The instance is clean. Run the Provision"
            echo " workflow to set it up again."
            echo "==========================================="
