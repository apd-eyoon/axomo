name: 1. Provision EC2

# Installs .NET 10 runtime, SQL Server 2022, Nginx, and configures the
# systemd service on the EC2 instance. Run this once before the first deploy,
# or after a teardown. The instance must be reachable via SSH.
#
# Targets: Amazon Linux 2023 (RHEL9-compatible)
#
# Required GitHub Secrets:
#   EC2_HOST        - Public IP or DNS of the EC2 instance
#   EC2_SSH_KEY     - Contents of the .pem private key file
#   DB_SA_PASSWORD  - Password to set for the SQL Server 'sa' account
#                     (min 8 chars, must include uppercase, lowercase, digit, symbol)

on:
  workflow_dispatch:

jobs:
  provision:
    name: Provision EC2 instance
    runs-on: ubuntu-latest
    steps:
      - name: Install runtime, SQL Server, and configure services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            echo "==> Updating system packages..."
            sudo dnf update -y
            sudo dnf install -y curl wget nginx unzip

            # ── .NET 10 ASP.NET Core Runtime ──────────────────────────────────
            echo "==> Installing .NET 10 ASP.NET Core Runtime..."
            curl -fsSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
            chmod +x /tmp/dotnet-install.sh
            sudo /tmp/dotnet-install.sh \
              --channel 10.0 \
              --runtime aspnet \
              --install-dir /usr/share/dotnet
            sudo ln -sf /usr/share/dotnet/dotnet /usr/local/bin/dotnet
            dotnet --info

            # ── SQL Server 2022 ───────────────────────────────────────────────
            # AL2023 is RHEL9-compatible — use the rhel/9 repo
            echo "==> Adding SQL Server 2022 repository..."
            sudo curl -o /etc/yum.repos.d/mssql-server-2022.repo \
              https://packages.microsoft.com/config/rhel/9/mssql-server-2022.repo

            echo "==> Installing SQL Server..."
            sudo dnf install -y mssql-server

            echo "==> Configuring SQL Server (Developer edition)..."
            sudo MSSQL_SA_PASSWORD="${{ secrets.DB_SA_PASSWORD }}" \
                 MSSQL_PID="Developer" \
                 ACCEPT_EULA="Y" \
                 /opt/mssql/bin/mssql-conf -n setup

            sudo systemctl enable mssql-server
            sudo systemctl start mssql-server

            echo "==> Waiting for SQL Server to be ready..."
            for i in $(seq 1 12); do
              if sudo systemctl is-active --quiet mssql-server; then
                echo "SQL Server is running."
                break
              fi
              echo "  Attempt $i/12 — waiting 5s..."
              sleep 5
            done

            # ── sqlcmd tools ──────────────────────────────────────────────────
            echo "==> Installing sqlcmd tools..."
            sudo curl -o /etc/yum.repos.d/mssql-release.repo \
              https://packages.microsoft.com/config/rhel/9/prod.repo
            sudo ACCEPT_EULA=Y dnf install -y mssql-tools18 unixODBC-devel
            echo 'export PATH="$PATH:/opt/mssql-tools18/bin"' \
              | sudo tee /etc/profile.d/mssql-tools.sh > /dev/null

            # ── App directories ───────────────────────────────────────────────
            echo "==> Creating application directories..."
            sudo mkdir -p /opt/storecreditor
            sudo chown ec2-user:ec2-user /opt/storecreditor

            # Secrets directory — only readable by ec2-user (the service user)
            sudo mkdir -p /etc/storecreditor
            sudo chown ec2-user:ec2-user /etc/storecreditor
            sudo chmod 700 /etc/storecreditor

            # Placeholder environment file so the service can start even before
            # the first deploy writes real values.
            touch /etc/storecreditor/environment
            chmod 600 /etc/storecreditor/environment

            # ── systemd service ───────────────────────────────────────────────
            echo "==> Creating systemd service..."
            sudo tee /etc/systemd/system/storecreditor.service > /dev/null <<'SERVICE'
            [Unit]
            Description=StoreCreditor ASP.NET Core Application
            After=network.target mssql-server.service
            Requires=mssql-server.service

            [Service]
            WorkingDirectory=/opt/storecreditor
            ExecStart=/usr/local/bin/dotnet /opt/storecreditor/StoreCreditor.Web.dll
            Restart=always
            RestartSec=10
            KillSignal=SIGINT
            SyslogIdentifier=storecreditor
            User=ec2-user
            EnvironmentFile=/etc/storecreditor/environment

            [Install]
            WantedBy=multi-user.target
            SERVICE

            sudo systemctl daemon-reload

            # ── Nginx reverse proxy ───────────────────────────────────────────
            # Amazon Linux nginx uses conf.d/ — no sites-available/sites-enabled
            echo "==> Configuring Nginx..."
            sudo tee /etc/nginx/conf.d/storecreditor.conf > /dev/null <<'NGINX'
            server {
                listen 80;
                server_name _;

                client_max_body_size 50M;

                location / {
                    proxy_pass         http://localhost:5000;
                    proxy_http_version 1.1;
                    proxy_set_header   Upgrade $http_upgrade;
                    proxy_set_header   Connection keep-alive;
                    proxy_set_header   Host $host;
                    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header   X-Forwarded-Proto $scheme;
                    proxy_read_timeout 90;
                    proxy_cache_bypass $http_upgrade;
                }
            }
            NGINX

            sudo nginx -t
            sudo systemctl enable nginx
            sudo systemctl restart nginx

            echo ""
            echo "=========================================="
            echo " Provisioning complete."
            echo " Run the Deploy workflow to push the app."
            echo "=========================================="
