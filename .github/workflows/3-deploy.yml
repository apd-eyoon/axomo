# Workflow 3: Build and Deploy
#
# Builds the app in Release mode, publishes it, runs EF Core database migrations
# via a self-contained migration bundle, then deploys to the EC2 instance and
# restarts the systemd service. The app is then accessible at HTTP and HTTPS
# through nginx.
#
# Trigger: push to main, or manually via workflow_dispatch.
#
# Required GitHub Secrets:
#   EC2_HOST        — EC2 public IP or hostname
#   EC2_USER        — SSH username (e.g. ubuntu)
#   EC2_SSH_KEY     — Full PEM private key content
#   RDS_HOST        — RDS SQL Server endpoint
#   RDS_PORT        — SQL Server port (typically 1433)
#   RDS_DATABASE    — Database name
#   RDS_USER        — SQL Server username
#   RDS_PASSWORD    — SQL Server password
#
# PREREQUISITES:
#   1. Run workflow '1 · Provision EC2' at least once before deploying.
#
# HTTPS / COOKIE NOTE:
#   The app sets CookieSecurePolicy.Always, so authentication cookies require HTTPS.
#   This workflow keeps nginx configured for HTTPS on 443 with a fallback
#   self-signed certificate. Replace it with a trusted certificate later, e.g.
#   sudo certbot --nginx -d your-domain.com

name: "3 · Build & Deploy"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build, migrate, and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore StoreCreditor.sln

      - name: Build
        run: dotnet build StoreCreditor.sln -c Release --no-restore

      - name: Publish
        run: |
          dotnet publish src/StoreCreditor.Web/StoreCreditor.Web.csproj \
            -c Release \
            --no-build \
            -o ./publish

      # Produces a self-contained Linux executable that applies EF Core migrations
      # without needing the .NET SDK installed on the EC2 instance.
      - name: Build EF Core migration bundle
        run: |
          echo "=== .NET environment ==="
          dotnet --version
          dotnet --list-sdks
          dotnet --list-runtimes

          echo "=== Installing dotnet-ef globally ==="
          dotnet tool install --global dotnet-ef --version 10.0.9
          export PATH="$PATH:$HOME/.dotnet/tools"

          echo "=== Verifying dotnet-ef binary ==="
          which dotnet-ef || echo "dotnet-ef not found in PATH"
          dotnet-ef --version || echo "dotnet-ef --version failed"

          echo "=== Local tool manifest ==="
          cat src/StoreCreditor.Web/dotnet-tools.json || echo "No local tool manifest found"

          echo "=== Restoring with linux-x64 runtime for migration bundle ==="
          dotnet restore StoreCreditor.sln --runtime linux-x64

          echo "=== Running migration bundle ==="
          dotnet-ef migrations bundle \
            --project src/StoreCreditor.Data \
            --startup-project src/StoreCreditor.Web \
            --self-contained \
            --runtime linux-x64 \
            --output ./migrationbundle \
            --force \
            --verbose

      - name: Package deployment artifacts
        run: |
          tar -czf storecreditor-deploy.tar.gz -C ./publish .

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      # Keep this here because this workflow is the one that runs on push.
      # Kestrel stays private on localhost:5000; nginx exposes HTTP/HTTPS publicly.
      - name: Configure nginx HTTP and HTTPS reverse proxy
        run: |
          cat > /tmp/storecreditor.nginx << 'EOF'
          map $http_upgrade $connection_upgrade {
              default upgrade;
              ''      close;
          }

          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name _;

              client_max_body_size 50M;

              location / {
                  proxy_pass         http://127.0.0.1:5000;
                  proxy_http_version 1.1;

                  # WebSocket / Blazor SignalR
                  proxy_set_header   Upgrade           $http_upgrade;
                  proxy_set_header   Connection        $connection_upgrade;

                  # Forward original request context to ASP.NET Core
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;

                  proxy_read_timeout 300s;
                  proxy_cache_bypass $http_upgrade;
              }
          }

          server {
              listen 443 ssl default_server;
              listen [::]:443 ssl default_server;
              server_name _;

              ssl_certificate     /etc/storecreditor/tls/storecreditor.crt;
              ssl_certificate_key /etc/storecreditor/tls/storecreditor.key;
              ssl_protocols       TLSv1.2 TLSv1.3;

              client_max_body_size 50M;

              location / {
                  proxy_pass         http://127.0.0.1:5000;
                  proxy_http_version 1.1;

                  # WebSocket / Blazor SignalR
                  proxy_set_header   Upgrade           $http_upgrade;
                  proxy_set_header   Connection        $connection_upgrade;

                  # Forward original request context to ASP.NET Core
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;

                  proxy_read_timeout 300s;
                  proxy_cache_bypass $http_upgrade;
              }
          }
          EOF

          scp /tmp/storecreditor.nginx \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/storecreditor.nginx
          rm -f /tmp/storecreditor.nginx

          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' << 'ENDSSH'
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y nginx openssl
          sudo systemctl enable nginx
          sudo mkdir -p /etc/storecreditor/tls
          if [ ! -f /etc/storecreditor/tls/storecreditor.crt ] || [ ! -f /etc/storecreditor/tls/storecreditor.key ]; then
            sudo openssl req \
              -x509 \
              -nodes \
              -newkey rsa:2048 \
              -days 365 \
              -keyout /etc/storecreditor/tls/storecreditor.key \
              -out /etc/storecreditor/tls/storecreditor.crt \
              -subj "/CN=storecreditor.local"
            sudo chmod 600 /etc/storecreditor/tls/storecreditor.key
            sudo chmod 644 /etc/storecreditor/tls/storecreditor.crt
          fi
          sudo mv /tmp/storecreditor.nginx /etc/nginx/sites-available/default
          sudo ln -sf /etc/nginx/sites-available/default /etc/nginx/sites-enabled/default
          sudo rm -f /etc/nginx/sites-enabled/storecreditor
          sudo rm -f /etc/nginx/sites-available/storecreditor
          sudo nginx -t
          sudo systemctl reload nginx || sudo systemctl restart nginx
          echo "✓ nginx is configured for HTTP on 80 and HTTPS on 443"
          ENDSSH

      - name: Upload artifacts to EC2
        run: |
          scp storecreditor-deploy.tar.gz \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/storecreditor-deploy.tar.gz
          scp migrationbundle \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/migrationbundle

      - name: Stop service before deployment
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' << 'ENDSSH'
          set -euo pipefail
          if systemctl is-active --quiet storecreditor; then
            sudo systemctl stop storecreditor
            echo "✓ Service stopped"
          else
            echo "Service was not running"
          fi
          ENDSSH

      - name: Deploy application files
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' << 'ENDSSH'
          set -euo pipefail
          sudo rm -rf /var/www/storecreditor/*
          sudo tar -xzf /tmp/storecreditor-deploy.tar.gz -C /var/www/storecreditor
          sudo chown -R storecreditor:storecreditor /var/www/storecreditor
          sudo chmod -R 755 /var/www/storecreditor
          rm -f /tmp/storecreditor-deploy.tar.gz
          echo "✓ Application files deployed to /var/www/storecreditor"
          ENDSSH

      # The migration bundle reads the connection string from the environment file
      # written by workflow 1. It is self-contained and does not need the SDK.
      - name: Run database migrations
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' << 'ENDSSH'
          set -euo pipefail
          sudo chmod +x /tmp/migrationbundle
          # Source the environment file to get the connection string, then run migrations
          sudo bash -c '
            set -a
            source /etc/storecreditor/environment
            set +a
            /tmp/migrationbundle
          '
          rm -f /tmp/migrationbundle
          echo "✓ Migrations applied"
          ENDSSH

      - name: Start service
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' << 'ENDSSH'
          set -euo pipefail
          sudo systemctl start storecreditor
          # Wait a moment and verify the service came up
          sleep 5
          if systemctl is-active --quiet storecreditor; then
            echo "✓ storecreditor service is running"
          else
            echo "ERROR: Service failed to start. Checking logs..."
            sudo journalctl -u storecreditor -n 50 --no-pager
            exit 1
          fi
          ENDSSH

      - name: Smoke test
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' << 'ENDSSH'
          set -euo pipefail
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://localhost:5000/ || echo "000")
          echo "HTTP response from localhost:5000 → ${HTTP_CODE}"
          if [ "${HTTP_CODE}" = "000" ]; then
            echo "ERROR: App did not respond"
            sudo journalctl -u storecreditor -n 30 --no-pager
            exit 1
          fi
          NGINX_HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://localhost/ || echo "000")
          NGINX_HTTPS_CODE=$(curl -k -s -o /dev/null -w "%{http_code}" --max-time 10 https://localhost/ || echo "000")
          echo "HTTP response from nginx localhost:80 → ${NGINX_HTTP_CODE}"
          echo "HTTPS response from nginx localhost:443 → ${NGINX_HTTPS_CODE}"
          if [ "${NGINX_HTTP_CODE}" = "000" ] || [ "${NGINX_HTTPS_CODE}" = "000" ]; then
            echo "ERROR: nginx did not respond on both HTTP and HTTPS"
            sudo nginx -T | tail -n 120
            exit 1
          fi
          echo "✓ App is responding"
          echo ""
          echo "Deployment complete. Access the app at:"
          echo "  http://${{ secrets.EC2_HOST }}"
          echo "  https://${{ secrets.EC2_HOST }}"
          ENDSSH
